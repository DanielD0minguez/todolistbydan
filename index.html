<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo List by Dan</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-slide-down { animation: slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    @keyframes waterExpand {
      0% { opacity: 0; transform: scale(0.95); filter: blur(5px); }
      100% { opacity: 1; transform: scale(1); filter: blur(0); }
    }
    .animate-water { animation: waterExpand 0.4s ease-out forwards; }

    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-purple-950 to-slate-900 font-sans p-4 sm:p-8 text-white selection:bg-purple-500/30">

  <div class="max-w-6xl mx-auto animate-slide-down">
    <!-- Header -->
    <header class="flex flex-col sm:flex-row items-center justify-between gap-6 mb-8 glass p-6 sm:p-8 rounded-3xl shadow-2xl">
      <div>
        <h1 class="text-4xl sm:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-cyan-400 tracking-tighter mb-2">ToDo List by Dan</h1>
        <p class="text-white/40 font-medium text-sm italic">De neurodivergente para neurodivergentes</p>
      </div>
      <button onclick="addTask()" class="bg-gradient-to-r from-violet-500 to-fuchsia-500 shadow-[0_5px_0_0_#4c1d95] text-white font-bold rounded-xl px-6 py-4 flex items-center justify-center transition-all duration-150 active:shadow-[0_0px_0_0_transparent] active:translate-y-[5px]">
        <i data-lucide="plus" class="w-6 h-6 mr-2"></i> Nueva Tarea
      </button>
    </header>

    <div class="flex flex-col lg:flex-row gap-8 items-start">
      <!-- Sidebar -->
      <aside class="w-full lg:w-1/3 glass rounded-3xl p-4 shadow-2xl max-h-[75vh] overflow-y-auto custom-scrollbar">
        <h2 class="text-lg font-bold text-white/70 mb-4 px-2 flex items-center gap-2">
          <i data-lucide="layers" class="w-4 h-4"></i> Actividades
        </h2>
        <div id="sidebar-tasks" class="space-y-3">
          <!-- Las tareas se inyectan aquí -->
        </div>
      </aside>

      <!-- Main Content -->
      <main id="main-content" class="w-full lg:w-2/3">
        <!-- El detalle de la tarea se inyecta aquí -->
      </main>
    </div>
  </div>

  <script>
    // --- ESTADO ---
    const STORAGE_KEY = 'todo_list_by_dan_local_v1';
    let state = {
      tasks: [],
      selectedTaskId: null
    };

    // --- AUDIO ---
    const playAlarm = (type) => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = type === 'timer' ? 'square' : 'sine';
        osc.frequency.setValueAtTime(type === 'timer' ? 1200 : 880, ctx.currentTime);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        osc.start();
        osc.stop(ctx.currentTime + 0.4);
      } catch (e) {}
    };

    // --- PERSISTENCIA ---
    const save = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    const load = () => {
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) state = JSON.parse(data);
    };

    // --- FORMATEO ---
    const formatTime = (s) => {
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      const res = [m, sec].map(v => v.toString().padStart(2, '0'));
      return h > 0 ? `${h}:${res[0]}:${res[1]}` : `${res[0]}:${res[1]}`;
    };

    // --- RENDER ---
    function render() {
      // Render Sidebar
      const sidebar = document.getElementById('sidebar-tasks');
      if (state.tasks.length === 0) {
        sidebar.innerHTML = '<p class="text-white/30 text-center py-4">No hay tareas aún</p>';
      } else {
        sidebar.innerHTML = state.tasks.map(t => `
          <div onclick="selectTask('${t.id}')" class="p-4 rounded-2xl cursor-pointer transition-all border ${state.selectedTaskId === t.id ? 'bg-violet-500/20 border-violet-400/50' : 'bg-black/20 border-white/5 hover:bg-white/10'}">
            <div class="flex items-center gap-3">
              <i data-lucide="${t.completed ? 'check-circle' : (t.status === 'running' ? 'play' : 'circle')}" class="w-5 h-5 ${t.completed ? 'text-emerald-400' : 'text-white/50'}"></i>
              <div class="truncate flex-1 font-bold text-sm ${t.completed ? 'line-through text-white/30' : ''}">${t.name || 'Sin nombre'}</div>
              <div class="text-[10px] opacity-40 font-mono">${formatTime(t.timeInvested)}</div>
            </div>
          </div>
        `).join('');
      }

      // Render Main
      const main = document.getElementById('main-content');
      const task = state.tasks.find(t => t.id === state.selectedTaskId);

      if (!task) {
        main.innerHTML = `<div class="glass rounded-3xl p-12 text-center border-dashed"><i data-lucide="mouse-pointer-2" class="w-12 h-12 mx-auto mb-4 opacity-20"></i><p class="opacity-40">Selecciona o crea una tarea para comenzar</p></div>`;
      } else {
        main.innerHTML = `
          <div class="animate-water glass rounded-3xl p-6 shadow-2xl">
            <div class="flex items-center justify-between mb-6">
              <input type="text" value="${task.name}" oninput="updateTask('${task.id}', 'name', this.value)" placeholder="Nombre de la tarea..." class="bg-transparent text-2xl font-bold outline-none border-b border-transparent focus:border-violet-500/50 flex-1 mr-4">
              <button onclick="deleteTask('${task.id}')" class="p-3 bg-red-500/10 hover:bg-red-500/20 text-red-400 rounded-xl transition-all"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="space-y-4">
                <div class="bg-black/20 p-4 rounded-2xl border border-white/5">
                  <label class="text-[10px] uppercase tracking-widest opacity-40 mb-2 block">Notas / Hiperenfoque</label>
                  <textarea oninput="updateTask('${task.id}', 'notes', this.value)" class="bg-transparent w-full h-32 resize-none outline-none text-sm leading-relaxed" placeholder="Escribe aquí tus pensamientos o pasos...">${task.notes || ''}</textarea>
                </div>
                <div class="flex gap-2">
                  <button onclick="addTime('${task.id}', 300)" class="flex-1 p-2 bg-white/5 rounded-lg text-xs hover:bg-white/10">+5m</button>
                  <button onclick="addTime('${task.id}', 1500)" class="flex-1 p-2 bg-white/5 rounded-lg text-xs hover:bg-white/10">+25m</button>
                  <button onclick="updateTask('${task.id}', 'estimatedTime', 0)" class="p-2 bg-red-500/10 rounded-lg text-xs text-red-400">Reset</button>
                </div>
              </div>

              <div class="flex flex-col gap-4">
                <div class="bg-black/40 p-6 rounded-2xl border border-white/10 text-center">
                  <div class="text-[10px] opacity-40 mb-2">CRONÓMETRO TOTAL</div>
                  <div class="text-5xl font-black tabular-nums mb-4 ${task.status === 'running' ? 'text-cyan-400' : ''}">${formatTime(task.timeInvested)}</div>
                  <div class="flex justify-center gap-4">
                    <button onclick="toggleTimer('${task.id}')" class="w-14 h-14 rounded-full flex items-center justify-center bg-emerald-500 shadow-lg shadow-emerald-500/20"><i data-lucide="${task.status === 'running' ? 'pause' : 'play'}"></i></button>
                    <button onclick="updateTask('${task.id}', 'timeInvested', 0)" class="w-14 h-14 rounded-full flex items-center justify-center bg-white/10"><i data-lucide="refresh-cw"></i></button>
                  </div>
                </div>
                <button onclick="toggleComplete('${task.id}')" class="w-full p-4 rounded-2xl font-bold flex items-center justify-center gap-2 ${task.completed ? 'bg-emerald-500/20 text-emerald-400' : 'bg-white/5 hover:bg-white/10 text-white/70'}">
                  <i data-lucide="${task.completed ? 'check-circle' : 'circle'}"></i>
                  ${task.completed ? 'Tarea Completada' : 'Marcar como completada'}
                </button>
              </div>
            </div>
          </div>
        `;
      }
      lucide.createIcons();
    }

    // --- FUNCIONES ---
    window.addTask = () => {
      const id = Date.now().toString();
      state.tasks.unshift({ id, name: '', notes: '', timeInvested: 0, estimatedTime: 0, status: 'idle', completed: false });
      state.selectedTaskId = id;
      save();
      render();
    };

    window.selectTask = (id) => {
      state.selectedTaskId = id;
      render();
    };

    window.updateTask = (id, key, val) => {
      const t = state.tasks.find(x => x.id === id);
      if (t) {
        t[key] = val;
        save();
        render();
      }
    };

    window.deleteTask = (id) => {
      state.tasks = state.tasks.filter(x => x.id !== id);
      if (state.selectedTaskId === id) state.selectedTaskId = null;
      save();
      render();
    };

    window.toggleTimer = (id) => {
      const t = state.tasks.find(x => x.id === id);
      if (t) {
        t.status = t.status === 'running' ? 'paused' : 'running';
        save();
        render();
      }
    };

    window.toggleComplete = (id) => {
      const t = state.tasks.find(x => x.id === id);
      if (t) {
        t.completed = !t.completed;
        if (t.completed) t.status = 'paused';
        save();
        render();
      }
    };

    window.addTime = (id, seconds) => {
      const t = state.tasks.find(x => x.id === id);
      if (t) {
        t.estimatedTime += seconds;
        save();
        render();
      }
    };

    // --- LOOP ---
    setInterval(() => {
      let active = false;
      state.tasks.forEach(t => {
        if (t.status === 'running') {
          t.timeInvested++;
          active = true;
          if (t.estimatedTime > 0 && t.timeInvested === t.estimatedTime) playAlarm('limit');
        }
      });
      if (active) {
        render();
        save();
      }
    }, 1000);

    // --- INICIO ---
    load();
    render();
  </script>
</body>
</html>
